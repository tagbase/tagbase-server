events {
    #worker_connections  1024;
}

http {
    access_log  /var/log/nginx/access.log;
    charset utf-8;
    error_log  /var/log/nginx/error.log debug;
    server_name_in_redirect off;
    server_tokens off;

    # Docker embedded DNS — resolve observability backends at request time so
    # nginx can start when the observability profile is off (those hosts 502).
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream pgadmin4 {
        server pgadmin4:5434;
    }

    upstream tagbase_server {
        server tagbase_server:5433;
    }

    # always redirect to https
    server {
        listen 81 default_server;

        server_name _;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        auth_basic "Protected Website";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Scheme $scheme;

        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        location /docs {
            proxy_pass http://tagbase_server/tagbase/api/v0.14.0/ui;
            proxy_set_header Origin http://127.0.0.1;
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin $http_origin;
        }

        location /pgadmin4/ {
            proxy_set_header X-Script-Name /pgadmin4;
            proxy_pass http://pgadmin4/;
            proxy_redirect off;
        }

        location /tagbase {
            client_max_body_size 1000M;
            proxy_pass http://tagbase_server;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Forwarded-Path /tagbase;
        }

        # ── Observability (LGTM + Alloy) — 502 if profile is off ──
        # Grafana/Prometheus serve under their URL prefix: do NOT strip with a
        # trailing slash on proxy_pass (that caused redirect loops).
        # Alloy serves at /; Loki/Tempo have no HTML UI at / — redirect roots
        # to Grafana Explore; keep /loki/… and /tempo/… for APIs.
        # Clear Authorization so nginx Basic Auth is not forwarded to anonymous
        # Grafana (and peers); otherwise upstream 401s re-prompt the browser.

        location /grafana/ {
            set $grafana_upstream grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        location /alloy/ {
            set $alloy_upstream alloy:12345;
            proxy_pass http://$alloy_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        location /prometheus/ {
            set $prometheus_upstream prometheus:9090;
            proxy_pass http://$prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        location = /loki {
            return 302 /grafana/explore;
        }
        location = /loki/ {
            return 302 /grafana/explore;
        }
        location /loki/ {
            set $loki_upstream loki:3100;
            proxy_pass http://$loki_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        location = /tempo {
            return 302 /grafana/explore;
        }
        location = /tempo/ {
            return 302 /grafana/explore;
        }
        location /tempo/ {
            set $tempo_upstream tempo:3200;
            proxy_pass http://$tempo_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }
    }
}

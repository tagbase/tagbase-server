name: main pr build

on:
  # Trigger analysis when pushing to main or pull requests, and when creating
  # a pull request.
  push:
    branches:
      - main
  pull_request:
      types: [opened, synchronize, reopened]
jobs:
  lint_openapi:
    name: Lint OpenAPI Specification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 # Required to mount the Github Workspace to a volume
      - name: Lint OpenAPI Specification
        uses: addnab/docker-run-action@v3
        with:
          image: ibmdevxsdk/openapi-validator:latest
          options: -v ${{ github.workspace }}:/data
          run: |
            lint-openapi --warnings-limit 0 openapi.yaml
            exit $?
  lint_dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - tagbase_server/Dockerfile
          - services/docker-cron/Dockerfile
          - services/fswatch/Dockerfile
          - services/nginx/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Lint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          config: .hadolint.yaml
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        # Disabling shallow clone is recommended for improving relevancy of reporting
        fetch-depth: 0
    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: "3.14"
    - name: Install tox and any other packages
      run: python -m pip install tox
    - name: Run tox
      working-directory: tagbase_server
      run: tox -e py
    - name: Fix code coverage paths
      working-directory: tagbase_server/tagbase_server
      run: |
        sed -i "s/\/home\/runner\/work\/tagbase-server\/tagbase-server\/tagbase_server\/tagbase_server/\/github\/workspace\/tagbase_server\/tagbase_server\//g" coverage.xml
    - name: SonarCloud Analysis
      if: ${{ github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
      uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        projectBaseDir: tagbase_server/tagbase_server
        args: >
          -Dsonar.exclusions=test/**
          -Dsonar.organization=tagbase
          -Dsonar.projectKey=tagbase_tagbase-server
          -Dsonar.python.coverage.reportPaths=coverage.xml
          -Dsonar.python.version=3.10,3.11,3.12,3.13,3.14
          -Dsonar.sources=.
          -Dsonar.tests=test
          -Dsonar.test.inclusions=test/**
          -Dsonar.verbose=true
  tox_tests:
    name: Tox Testing
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox tox-gh-actions
      - name: Run tox
        working-directory: tagbase_server
        # Run tox using the version of Python in `PATH`
        run: tox -e py
